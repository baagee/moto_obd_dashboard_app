    <script>
        // Logs Data Manager
        const LogsManager = {
            logs: [],
            currentFilter: 'all',
            searchTerm: '',

            // Generate random log
            generateLog() {
                const logs = [
                    { type: 'success', message: 'ECU 握手成功' },
                    { type: 'warning', message: 'O2 传感器电压波动' },
                    { type: 'error', message: 'P0118: 发动机冷却液温度电路过高' },
                    { type: 'info', message: '燃油修正读数：正常' },
                    { type: 'warning', message: '胎压过低：后轮 (32 PSI)' },
                    { type: 'success', message: '变速箱温度：正常' },
                    { type: 'info', message: '进气流量：最佳' },
                    { type: 'warning', message: '电池电压轻微下降' },
                    { type: 'success', message: '制动系统检查：通过' },
                    { type: 'info', message: '节气门位置传感器：已校准' },
                    { type: 'error', message: 'P0300: 检测到随机/多缸失火' },
                    { type: 'warning', message: '机油压力低于正常范围' },
                    { type: 'success', message: 'ABS 系统：正常' },
                    { type: 'info', message: '氧传感器：读数正常' },
                    { type: 'error', message: 'P0420: 催化系统效率低于阈值' },
                ];
                return logs[Math.floor(Math.random() * logs.length)];
            },

            // Add new log
            addLog() {
                const log = this.generateLog();
                const now = new Date();
                const timestamp = now.toISOString();

                this.logs.unshift({
                    id: Date.now(),
                    timestamp: timestamp,
                    type: log.type,
                    message: log.message
                });

                // Keep last 100 logs
                if (this.logs.length > 100) {
                    this.logs.pop();
                }
            },

            // Get filtered logs
            getFilteredLogs() {
                let filtered = this.logs;

                // Apply type filter
                if (this.currentFilter !== 'all') {
                    filtered = filtered.filter(log => log.type === this.currentFilter);
                }

                // Apply search filter
                if (this.searchTerm) {
                    const term = this.searchTerm.toLowerCase();
                    filtered = filtered.filter(log =>
                        log.message.toLowerCase().includes(term) ||
                        log.type.toLowerCase().includes(term)
                    );
                }

                return filtered;
            },

            // Clear all logs
            clearAll() {
                this.logs = [];
            },

            // Export logs
            exportLogs() {
                const data = this.logs.map(log => ({
                    timestamp: log.timestamp,
                    type: log.type,
                    message: log.message
                }));

                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `diagnostic-logs-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }
        };

        // UI Controller
        const UI = {
            colorMap: {
                success: 'accent-green',
                warning: 'accent-orange',
                error: 'accent-red',
                info: 'primary'
            },

            iconMap: {
                success: 'check_circle',
                warning: 'warning',
                error: 'error',
                info: 'info'
            },

            // Format timestamp
            formatTimestamp(isoString) {
                const date = new Date(isoString);
                return date.toLocaleTimeString('en-US', {
                    hour12: false,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            },

            // Render single log
            renderLog(log) {
                const colorClass = this.colorMap[log.type];
                const icon = this.iconMap[log.type];
                const timestamp = this.formatTimestamp(log.timestamp);

                return `
                    <div class="log-row grid grid-cols-[80px_60px_1fr_80px] sm:grid-cols-[120px_100px_1fr_140px] gap-1 sm:gap-4 p-1 sm:p-4 border-b border-primary/10 items-center">
                        <span class="text-slate-500 font-mono text-[10px] sm:text-sm log-timestamp">${timestamp}</span>
                        <div class="flex items-center gap-1 sm:gap-2">
                            <span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-${colorClass} shadow-[0_0_5px_${colorClass === 'accent-green' ? '#00e676' : colorClass === 'accent-orange' ? '#ffab40' : colorClass === 'accent-red' ? '#ff4d4d' : '#0da6f2'}]"></span>
                            <span class="text-${colorClass} text-[8px] sm:text-xs font-bold uppercase log-type-badge">${log.type}</span>
                        </div>
                        <span class="text-slate-300 text-[10px] sm:text-sm ${log.type === 'error' || log.type === 'warning' ? 'font-medium' : ''} log-message truncate">${log.message}</span>
                        <div class="flex gap-1 sm:gap-2">
                            <button class="copy-btn p-1 sm:p-1.5 rounded bg-surface border border-primary/20 text-primary hover:bg-primary/10 transition-all log-action-btn" title="复制" data-message="${log.message}">
                                <span class="material-symbols-outlined text-xs sm:text-base">content_copy</span>
                            </button>
                            <button class="details-btn p-1 sm:p-1.5 rounded bg-surface border border-primary/20 text-slate-400 hover:bg-primary/10 hover:text-white transition-all log-action-btn" title="详情">
                                <span class="material-symbols-outlined text-xs sm:text-base">visibility</span>
                            </button>
                        </div>
                    </div>
                `;
            },

            // Render all logs
            renderLogs() {
                const container = document.getElementById('logs-container');
                const filteredLogs = LogsManager.getFilteredLogs();

                if (filteredLogs.length === 0) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-10 sm:py-20 text-slate-500">
                            <span class="material-symbols-outlined text-4xl sm:text-6xl mb-2 sm:mb-4">description</span>
                            <p class="text-[10px] sm:text-sm font-medium">暂无日志</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = filteredLogs.map(log => this.renderLog(log)).join('');
                }

                this.updateStats();
            },

            // Update statistics
            updateStats() {
                const logs = LogsManager.logs;
                document.getElementById('total-count').textContent = logs.length;
                document.getElementById('success-count').textContent = logs.filter(l => l.type === 'success').length;
                document.getElementById('warning-count').textContent = logs.filter(l => l.type === 'warning').length;
                document.getElementById('error-count').textContent = logs.filter(l => l.type === 'error').length;
            },

            // Bind events
            bindEvents() {
                // Filter buttons
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => {
                            b.classList.remove('active', 'bg-primary', 'text-white');
                            b.classList.add('bg-surface', 'text-slate-400');
                        });
                        e.target.classList.add('active', 'bg-primary', 'text-white');
                        e.target.classList.remove('bg-surface', 'text-slate-400');
                        LogsManager.currentFilter = e.target.dataset.type;
                        this.renderLogs();
                    });
                });

                // Search input
                document.getElementById('search-input').addEventListener('input', (e) => {
                    LogsManager.searchTerm = e.target.value;
                    this.renderLogs();
                });

                // Export button
                document.getElementById('export-btn').addEventListener('click', () => {
                    LogsManager.exportLogs();
                });

                // Clear all button
                document.getElementById('clear-btn').addEventListener('click', () => {
                    if (confirm('确定要清空所有日志吗？')) {
                        LogsManager.clearAll();
                        this.renderLogs();
                    }
                });

                // Copy and details buttons
                document.getElementById('logs-container').addEventListener('click', (e) => {
                    const copyBtn = e.target.closest('.copy-btn');
                    const detailsBtn = e.target.closest('.details-btn');

                    if (copyBtn) {
                        const message = copyBtn.dataset.message;
                        navigator.clipboard.writeText(message);
                        // Show feedback
                        const originalIcon = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<span class="material-symbols-outlined text-base">check</span>';
                        setTimeout(() => {
                            copyBtn.innerHTML = originalIcon;
                        }, 1000);
                    }

                    if (detailsBtn) {
                        // For now, just alert the details
                        alert('日志详情视图 - 即将推出！');
                    }
                });
            }
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Add initial logs
            for (let i = 0; i < 15; i++) {
                LogsManager.addLog();
            }

            // Render logs
            UI.renderLogs();

            // Bind events
            UI.bindEvents();

            // Add new log every 5 seconds
            setInterval(() => {
                LogsManager.addLog();
                UI.renderLogs();
            }, 5000);
        });
    </script>
</body>
</html>
