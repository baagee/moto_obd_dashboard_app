name: obd_dashboard
description: Futuristic OBD Main Dashboard - Flutter Edition
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  provider: ^6.1.1
  permission_handler: ^11.0.0
  flutter_blue_plus: ^1.32.0
  android_intent_plus: ^4.0.2
  share_plus: ^7.0.0
  path_provider: ^2.1.0
  sensors_plus: ^4.0.0
  audioplayers: ^6.0.0
  geolocator: ^11.0.0
  http: ^1.2.0
  sqflite: ^2.3.0
  path: ^1.8.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/